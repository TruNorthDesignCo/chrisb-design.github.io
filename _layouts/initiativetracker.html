<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D 5e Initiative & Combat Tracker</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Modern Scrollbar & Focus Transitions */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen antialiased font-sans pb-12">

    <div class="container mx-auto p-4 max-w-5xl">
        <header class="mb-8 text-center border-b border-slate-800 pb-4">
            <h1 class="text-4xl font-extrabold text-amber-500 tracking-wide drop-shadow-md">⚔️ D&D Initiative Tracker ⚔️</h1>
            <p class="text-slate-400 text-sm mt-1">Manage encounters, track HP, apply status conditions, and handle death saves natively.</p>
        </header>

        <!-- Dynamic Feedback Banner (Custom error/success notifications) -->
        <div id="feedback-banner" class="hidden mb-6 p-4 rounded-lg border text-sm flex items-center justify-between transition-all duration-300">
            <span id="feedback-text"></span>
            <button onclick="dismissFeedback()" class="text-slate-400 hover:text-white font-bold text-lg cursor-pointer ml-4">&times;</button>
        </div>

        <!-- Character Add Form -->
        <div class="bg-slate-800 p-6 rounded-lg shadow-xl mb-6 border border-slate-700">
            <h2 class="text-xl font-semibold mb-4 text-slate-300 flex items-center gap-2">
                <span>👤</span> Add Combatant
            </h2>
            <form id="add-character-form" class="grid grid-cols-2 md:grid-cols-6 gap-4 items-end">
                <div class="col-span-2 md:col-span-2">
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Name</label>
                    <input required type="text" id="form-name" placeholder="e.g. Goblin, Aragorn" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-amber-500 transition"/>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Max HP</label>
                    <input type="number" id="form-maxHp" placeholder="20" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-amber-500 transition"/>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Current HP</label>
                    <input type="text" id="form-currentHp" placeholder="Same as Max" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-amber-500 transition"/>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">AC</label>
                    <input type="number" id="form-ac" placeholder="15" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-amber-500 transition"/>
                </div>
                <div>
                    <label class="block text-xs uppercase tracking-wider text-slate-400 mb-1">Init Modifier</label>
                    <input type="number" id="form-initMod" placeholder="+2" class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 focus:outline-none focus:border-amber-500 transition"/>
                </div>
                <div class="col-span-2 md:col-span-6 flex flex-wrap justify-between items-center mt-2 gap-4">
                    <label class="flex items-center gap-2 text-sm text-slate-300 cursor-pointer select-none">
                        <input type="checkbox" id="form-isEnemy" class="w-4 h-4 bg-slate-900 border-slate-700 text-rose-600 rounded focus:ring-0 focus:ring-offset-0 cursor-pointer"/>
                        <span>Mark as Enemy / Foe</span>
                    </label>
                    <button type="submit" class="bg-amber-600 hover:bg-amber-500 text-white font-bold py-2 px-6 rounded shadow cursor-pointer transition-all">
                        + Add to Tracker
                    </button>
                </div>
            </form>
        </div>

        <!-- Global Commands -->
        <div class="flex flex-wrap gap-3 justify-between items-center mb-6 bg-slate-800/50 p-4 rounded-lg border border-slate-800">
            <div class="flex flex-wrap gap-3">
                <button id="btn-roll-all" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2 px-4 rounded transition-all cursor-pointer shadow">
                    🎲 Roll All Initiatives
                </button>
                <button id="btn-sort" class="bg-emerald-600 hover:bg-emerald-500 text-white font-semibold py-2 px-4 rounded transition-all cursor-pointer shadow">
                    🔃 Sort by Initiative
                </button>
            </div>
            <div class="flex flex-wrap gap-3">
                <label class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 px-4 rounded transition-all cursor-pointer shadow flex items-center gap-1.5 select-none">
                    📂 Load Encounter
                    <input type="file" id="file-loader" accept=".json" class="hidden" />
                </label>
                <button id="btn-save" class="bg-slate-700 hover:bg-slate-600 text-slate-200 font-semibold py-2 px-4 rounded transition-all cursor-pointer shadow">
                    💾 Save Encounter
                </button>
            </div>
        </div>

        <!-- Combatant Roster Container -->
        <div id="combatant-list" class="space-y-4">
            <!-- Rendered dynamically by JavaScript -->
        </div>
    </div>

    <!-- JavaScript Application Logic -->
    <script>

        // Standard D&D Status Conditions (Debuffs)
        const DEBUFF_CONDITIONS = [
            'Blinded', 'Charmed', 'Deafened', 'Frightened', 'Grappled', 
            'Incapacitated', 'Polymorphed', 'Paralyzed', 'Petrified', 
            'Poisoned', 'Prone', 'Restrained', 'Stunned', 'Exhausted', 
            'Unconscious', 'Slowed', 'Hexed', 'Madness', 'Banished', 
            'Marked', 'Bane'
        ];

        // Mechanical & Spells/Abilities Buffs (Positive)
        const BUFF_CONDITIONS = [
            'Blessed', 'Concentrating', 'Guidance', 'Hasted', 'Raging', 'Invisible', 'Shielded'
        ];

        // Sorted conditions array for clean dropdown mapping
        const ALL_CONDITIONS = [...DEBUFF_CONDITIONS, ...BUFF_CONDITIONS].sort();

        // Sample initial datasets
        let characters = [
        [
  {
    "id": "3",
    "name": "Ira",
    "currentHp": "36",
    "maxHp": 36,
    "tempHp": "0",
    "ac": 14,
    "initMod": 4,
    "initScore": 0,
    "isActive": true,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "2",
    "name": "Elyndor",
    "currentHp": "22",
    "maxHp": 22,
    "tempHp": "0",
    "ac": 10,
    "initMod": 0,
    "initScore": 0,
    "isActive": true,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "1",
    "name": "Theodren",
    "currentHp": "39",
    "maxHp": 39,
    "tempHp": "0",
    "ac": 14,
    "initMod": 2,
    "initScore": 0,
    "isActive": true,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "4",
    "name": "Thragor",
    "currentHp": "50",
    "maxHp": 50,
    "tempHp": "0",
    "ac": 15,
    "initMod": 2,
    "initScore": 0,
    "isActive": false,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "5",
    "name": "Baelon",
    "currentHp": "49",
    "maxHp": 49,
    "tempHp": "0",
    "ac": 16,
    "initMod": 3,
    "initScore": 0,
    "isActive": false,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "6",
    "name": "Kled",
    "currentHp": "49",
    "maxHp": 49,
    "tempHp": "0",
    "ac": 19,
    "initMod": 3,
    "initScore": 0,
    "isActive": false,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  },
  {
    "id": "7",
    "name": "Tisara",
    "currentHp": "38",
    "maxHp": 38,
    "tempHp": "0",
    "ac": 18,
    "initMod": 0,
    "initScore": 0,
    "isActive": false,
    "isEnemy": false,
    "deathSaves": {
      "successes": 0,
      "failures": 0
    },
    "conditions": []
  }
];


        // Custom notification system instead of browser alerts
        function showFeedback(message, type = 'success') {
            const banner = document.getElementById('feedback-banner');
            const bannerText = document.getElementById('feedback-text');
            bannerText.textContent = message;
            
            banner.className = "mb-6 p-4 rounded-lg border text-sm flex items-center justify-between transition-all duration-300 ";
            if (type === 'error') {
                banner.className += "bg-rose-950/40 border-rose-800 text-rose-200";
            } else {
                banner.className += "bg-emerald-950/40 border-emerald-800 text-emerald-200";
            }
            
            banner.classList.remove('hidden');
        }

        function dismissFeedback() {
            document.getElementById('feedback-banner').classList.add('hidden');
        }

        // Standard d20 Random Generator
        const rollD20 = () => Math.floor(Math.random() * 20) + 1;


        function rollSingleInitiative(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.initScore = rollD20() + char.initMod;
                renderCharacters();
            }
        }

        function rollAllInitiatives() {
            characters.forEach(char => {
                if (char.isActive) {
                    char.initScore = rollD20() + char.initMod;
                }
            });
            renderCharacters();
            showFeedback("Successfully rolled initiative for all active combatants!");
        }

        function sortInitiative() {
            characters.sort((a, b) => {
                if (a.isActive && !b.isActive) return -1;
                if (!a.isActive && b.isActive) return 1;
                if (a.isActive && b.isActive) return b.initScore - a.initScore;
                return 0;
            });
            renderCharacters();
            showFeedback("Sorted characters by descending initiative order.");
        }

        function toggleActive(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.isActive = !char.isActive;
                renderCharacters();
            }
        }

        function toggleEnemy(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.isEnemy = !char.isEnemy;
                renderCharacters();
            }
        }

        function duplicateCharacter(id) {
            const target = characters.find(char => char.id === id);
            if (!target) return;

            // Strip trailing digits for clean matching sequence
            const match = target.name.match(/^(.*?)(?:\s+(\d+))?$/);
            const baseName = match && match[1] ? match[1].trim() : target.name;

            let maxNum = 1;
            characters.forEach(char => {
                const charMatch = char.name.match(/^(.*?)(?:\s+(\d+))?$/);
                if (charMatch && charMatch[1] && charMatch[1].trim() === baseName) {
                    const num = charMatch[2] ? parseInt(charMatch[2], 10) : 1;
                    if (num > maxNum) maxNum = num;
                }
            });

            const nextNum = maxNum + 1;
            const iteratedName = `${baseName} ${nextNum}`;

            const duplicate = {
                ...target,
                id: Date.now().toString() + Math.random().toString(36).substring(2, 7),
                name: iteratedName,
                deathSaves: { successes: 0, failures: 0 },
                conditions: [...target.conditions]
            };

            characters.push(duplicate);
            renderCharacters();
            showFeedback(`Cloned ${target.name} as ${iteratedName}.`);
        }

        function removeCharacter(id) {
            const target = characters.find(char => char.id === id);
            characters = characters.filter(char => char.id !== id);
            renderCharacters();
            if (target) {
                showFeedback(`Removed ${target.name} from the roster.`);
            }
        }

        function handleDeathSaveToggle(id, type, index) {
            const char = characters.find(c => c.id === id);
            if (char) {
                const currentCount = char.deathSaves[type];
                const newCount = currentCount === index ? index - 1 : index;
                char.deathSaves[type] = Math.max(0, newCount);
                renderCharacters();
            }
        }

        function stabilizeCharacter(id) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.deathSaves.successes = 3;
                char.deathSaves.failures = 0;
                renderCharacters();
                showFeedback(`${char.name} has been stabilized.`);
            }
        }

        function addCondition(id, condition) {
            if (!condition) return;
            const char = characters.find(c => c.id === id);
            if (char && !char.conditions.includes(condition)) {
                char.conditions.push(condition);
                renderCharacters();
            }
        }

        function removeCondition(id, conditionToRemove) {
            const char = characters.find(c => c.id === id);
            if (char) {
                char.conditions = char.conditions.filter(c => c !== conditionToRemove);
                renderCharacters();
            }
        }


        function saveToFile() {
            try {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(characters, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", "encounter_save.json");
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
                showFeedback("Encounter state saved successfully.");
            } catch (err) {
                showFeedback("Failed to export encounter state.", "error");
            }
        }

        function loadFromFile(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (evt) => {
                try {
                    const parsedData = JSON.parse(evt.target.result);
                    if (Array.isArray(parsedData)) {
                        // Basic property checks on imported schemas
                        const validated = parsedData.map(item => ({
                            id: item.id || Date.now().toString() + Math.random().toString(36).substring(2, 5),
                            name: item.name || 'Unnamed Creature',
                            currentHp: item.currentHp !== undefined ? String(item.currentHp) : '10',
                            maxHp: parseInt(item.maxHp) || 10,
                            tempHp: item.tempHp !== undefined ? String(item.tempHp) : '0',
                            ac: parseInt(item.ac) || 10,
                            initMod: parseInt(item.initMod) || 0,
                            initScore: parseInt(item.initScore) || 0,
                            isActive: item.isActive !== undefined ? item.isActive : true,
                            isEnemy: item.isEnemy !== undefined ? item.isEnemy : false,
                            deathSaves: item.deathSaves || { successes: 0, failures: 0 },
                            conditions: item.conditions || []
                        }));

                        characters = validated;
                        renderCharacters();
                        showFeedback(`Successfully loaded ${validated.length} combatants from file.`);
                    } else {
                        showFeedback("Invalid file structure. Encounter must be an array of characters.", "error");
                    }
                } catch (err) {
                    showFeedback("Failed to parse file. Make sure it is a valid JSON file.", "error");
                }
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset file picker
        }


        // Smart dynamic content rendering
        function renderCharacters() {
            const listContainer = document.getElementById('combatant-list');
            listContainer.innerHTML = '';

            if (characters.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center text-slate-500 py-12 border border-dashed border-slate-800 rounded-lg bg-slate-950/20">
                        <p class="text-lg">No combatants loaded in the active pipeline.</p>
                        <p class="text-sm text-slate-600 mt-1">Use the builder above to deploy your party and foes.</p>
                    </div>
                `;
                return;
            }

            characters.forEach((char) => {
                const hpVal = parseInt(char.currentHp, 10);
                const isDown = !isNaN(hpVal) && hpVal <= 0;

                // Determine dynamic structural and coloring styles based on attributes
                let cardClass = "rounded-lg border shadow-md transition-all duration-200 p-4 ";
                if (!char.isActive) {
                    cardClass += "bg-slate-900/40 border-slate-800 opacity-50";
                } else if (char.isEnemy) {
                    cardClass += "bg-rose-950/20 border-rose-900/60 md:ml-6 ml-3";
                } else {
                    cardClass += "bg-slate-800 border-slate-700 hover:border-slate-600";
                }

                // Compile condition badge markup dynamically
                let conditionsMarkup = '';
                if (char.conditions.length > 0) {
                    conditionsMarkup = `
                        <div class="flex flex-wrap gap-1 mt-1.5">
                            ${char.conditions.map(cond => {
                                const isBuff = BUFF_CONDITIONS.includes(cond);
                                const badgeTheme = isBuff 
                                    ? "bg-emerald-950 border-emerald-800 text-emerald-300"
                                    : "bg-amber-950 border-amber-800 text-amber-300";

                                return `
                                    <span class="inline-flex items-center gap-1 border text-[10px] font-semibold px-2 py-0.5 rounded-full ${badgeTheme}">
                                        <span>${isBuff ? '✨ ' : ''}${cond}</span>
                                        <button data-action="remove-cond" data-id="${char.id}" data-cond="${cond}" class="hover:text-rose-400 font-bold ml-0.5 cursor-pointer">&times;</button>
                                    </span>
                                `;
                            }).join('')}
                        </div>
                    `;
                }

                // Compile condition selector choices dynamically
                const selectOptions = ALL_CONDITIONS.map(c => {
                    const isSelected = char.conditions.includes(c);
                    const prefix = BUFF_CONDITIONS.includes(c) ? '✨ ' : '';
                    return `
                        <option value="${c}" ${isSelected ? 'disabled' : ''}>
                            ${prefix}${c}
                        </option>
                    `;
                }).join('');

                // Compile Death Save tracking interface if eligible
                let deathSavesMarkup = '';
                if (char.isActive && isDown && !char.isEnemy) {
                    deathSavesMarkup = `
                        <div class="mt-3 pt-3 border-t border-slate-700/50 flex flex-col sm:flex-row sm:items-center justify-between gap-3 bg-slate-900/40 p-2.5 rounded-md">
                            <div class="flex flex-wrap gap-5 items-center">
                                <span class="text-xs font-bold tracking-wider text-rose-400 uppercase">Death Saves:</span>
                                
                                <!-- Success Circles -->
                                <div class="flex items-center gap-1.5">
                                    <span class="text-[10px] text-slate-400 font-semibold uppercase mr-1">Successes</span>
                                    ${[1, 2, 3].map(idx => {
                                        const filled = char.deathSaves.successes >= idx;
                                        return `
                                            <div data-action="death-save" data-id="${char.id}" data-type="successes" data-index="${idx}" 
                                                 class="w-4 h-4 rounded-full border-2 cursor-pointer transition-all ${filled ? 'bg-emerald-500 border-emerald-400' : 'border-slate-600 hover:border-emerald-500'}">
                                            </div>
                                        `;
                                    }).join('')}
                                </div>

                                <!-- Failure Circles -->
                                <div class="flex items-center gap-1.5">
                                    <span class="text-[10px] text-slate-400 font-semibold uppercase mr-1">Failures</span>
                                    ${[1, 2, 3].map(idx => {
                                        const filled = char.deathSaves.failures >= idx;
                                        return `
                                            <div data-action="death-save" data-id="${char.id}" data-type="failures" data-index="${idx}" 
                                                 class="w-4 h-4 rounded-full border-2 cursor-pointer transition-all ${filled ? 'bg-rose-600 border-rose-500' : 'border-slate-600 hover:border-rose-500'}">
                                            </div>
                                        `;
                                    }).join('')}
                                </div>
                            </div>

                            <button data-action="stabilize" data-id="${char.id}" class="bg-emerald-700 hover:bg-emerald-600 text-white text-[11px] font-bold py-1 px-3 rounded shadow transition cursor-pointer self-start sm:self-auto">
                                🛡️ Mark Stabilized
                            </button>
                        </div>
                    `;
                }

                // Compile final combatant card template string
                const cardHTML = `
                    <div class="${cardClass}">
                        <div class="flex flex-col md:flex-row md:items-center justify-between gap-3">
                            
                            <!-- Section: Initiative + Metadata -->
                            <div class="flex items-center gap-3 min-w-0">
                                <div class="flex flex-col items-center justify-center bg-slate-900 border border-slate-700 rounded w-12 h-12 shrink-0">
                                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-tight">Init</span>
                                    <span class="text-lg font-bold text-amber-400 leading-none mt-0.5">${char.initScore || '-'}</span>
                                </div>
                                <div class="min-w-0">
                                    <h3 class="text-lg font-bold flex flex-wrap items-center gap-1.5 truncate">
                                        <span>${char.name}</span>
                                        ${!char.isActive ? `<span class="text-[10px] bg-slate-700 text-slate-400 px-1.5 py-0.5 rounded font-normal select-none">Inactive</span>` : ''}
                                        ${char.isActive && isDown ? (
                                            char.isEnemy 
                                                ? `<span class="text-[10px] bg-rose-700 text-rose-100 px-1.5 py-0.5 rounded font-bold uppercase tracking-wider select-none">Dead</span>`
                                                : `<span class="text-[10px] bg-amber-700 text-amber-100 px-1.5 py-0.5 rounded font-normal animate-pulse select-none">Unconscious</span>`
                                        ) : ''}
                                    </h3>
                                    <p class="text-xs text-slate-400">Mod: ${char.initMod >= 0 ? '+' : ''}${char.initMod}</p>
                                    ${conditionsMarkup}
                                </div>
                            </div>

                            <!-- Section: Strict Single-Line Stats (AC, HP, Temp HP) -->
                            <div class="flex items-center gap-3 bg-slate-900/60 p-2 rounded-md border border-slate-800 shrink-0 flex-nowrap whitespace-nowrap">
                                <div class="flex flex-col items-center justify-center px-2 border-r border-slate-800">
                                    <span class="text-[9px] uppercase font-bold text-slate-400 tracking-wider leading-none">AC</span>
                                    <span class="text-base font-black text-amber-400 mt-1 leading-none">${char.ac}</span>
                                </div>
                                <div class="flex items-center gap-1.5">
                                    <label class="text-[11px] uppercase font-bold text-slate-400">HP:</label>
                                    <input type="text" data-field="currentHp" data-id="${char.id}" value="${char.currentHp}" 
                                           class="w-14 bg-slate-800 text-center border border-slate-700 rounded py-0.5 text-sm font-semibold text-rose-400 focus:outline-none focus:border-rose-500 transition"/>
                                    <span class="text-slate-600 text-xs">/</span>
                                    <span class="text-slate-300 text-sm font-semibold">${char.maxHp}</span>
                                </div>
                                <div class="flex items-center gap-1.5 border-l border-slate-800 pl-2">
                                    <label class="text-[11px] uppercase font-bold text-slate-400">Temp:</label>
                                    <input type="text" data-field="tempHp" data-id="${char.id}" value="${char.tempHp}" 
                                           class="w-14 bg-slate-800 text-center border border-slate-700 rounded py-0.5 text-sm font-semibold text-cyan-400 focus:outline-none focus:border-cyan-500 transition"/>
                                </div>
                            </div>

                            <!-- Section: Card Controls & Action Dropdown -->
                            <div class="flex flex-wrap gap-1.5 items-center justify-end shrink-0">
                                <select data-action="add-cond" data-id="${char.id}" 
                                        class="h-7 bg-slate-900 border border-slate-700 rounded text-[11px] px-1.5 text-slate-300 focus:outline-none focus:border-amber-500 cursor-pointer">
                                    <option value="">+ Condition / Buff</option>
                                    ${selectOptions}
                                </select>
                                
                                <button data-action="roll" data-id="${char.id}" ${!char.isActive ? 'disabled' : ''} 
                                        class="h-7 bg-slate-700 hover:bg-slate-600 disabled:opacity-40 disabled:cursor-not-allowed text-[11px] font-medium px-2 rounded transition-all cursor-pointer">
                                    🎲 Roll
                                </button>
                                <button data-action="toggle-enemy" data-id="${char.id}" 
                                        class="h-7 text-[11px] font-medium px-2 rounded transition-all cursor-pointer ${char.isEnemy ? 'bg-rose-900 text-rose-200 hover:bg-rose-800' : 'bg-slate-700 text-slate-200 hover:bg-slate-600'}">
                                    ${char.isEnemy ? '😈 Enemy' : '😇 Ally'}
                                </button>
                                <button data-action="toggle-active" data-id="${char.id}" 
                                        class="h-7 bg-slate-700 hover:bg-slate-600 text-[11px] font-medium px-2 rounded transition-all cursor-pointer">
                                    ${char.isActive ? '💤 Bench' : '⚔️ Deploy'}
                                </button>
                                
                                ${char.isEnemy ? `
                                    <button data-action="clone" data-id="${char.id}" 
                                            class="h-7 bg-slate-700 hover:bg-slate-600 text-[11px] font-medium px-2 rounded transition-all cursor-pointer">
                                        👥 Clone
                                    </button>
                                    <button data-action="drop" data-id="${char.id}" 
                                            class="h-7 bg-rose-950 text-rose-300 hover:bg-rose-900 text-[11px] font-medium px-2 rounded transition-all cursor-pointer">
                                        ❌ Drop
                                    </button>
                                ` : ''}
                            </div>
                        </div>

                        ${deathSavesMarkup}
                    </div>
                `;

                listContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }


        // Standard Document Initializers
        document.addEventListener('DOMContentLoaded', () => {
            renderCharacters();

            // Set up form submission logic
            const addForm = document.getElementById('add-character-form');
            addForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const nameInput = document.getElementById('form-name');
                const maxHpInput = document.getElementById('form-maxHp');
                const currentHpInput = document.getElementById('form-currentHp');
                const acInput = document.getElementById('form-ac');
                const initModInput = document.getElementById('form-initMod');
                const isEnemyInput = document.getElementById('form-isEnemy');

                const maxHp = parseInt(maxHpInput.value) || 10;
                const newChar = {
                    id: Date.now().toString() + Math.random().toString(36).substring(2, 5),
                    name: nameInput.value.trim(),
                    currentHp: currentHpInput.value.trim() || String(maxHp),
                    maxHp: maxHp,
                    tempHp: '0',
                    ac: parseInt(acInput.value) || 10,
                    initMod: parseInt(initModInput.value) || 0,
                    initScore: 0,
                    isActive: true,
                    isEnemy: isEnemyInput.checked,
                    deathSaves: { successes: 0, failures: 0 },
                    conditions: []
                };

                characters.push(newChar);
                renderCharacters();
                showFeedback(`Successfully deployed ${newChar.name} to the roster.`);

                // Reset builder inputs
                addForm.reset();
                nameInput.focus();
            });

            // Delegate global lists to robust event bindings
            const listContainer = document.getElementById('combatant-list');
            
            // Event delegation mapping
            listContainer.addEventListener('click', (e) => {
                const target = e.target.closest('[data-action]');
                if (!target) return;

                const action = target.getAttribute('data-action');
                const id = target.getAttribute('data-id');

                if (action === 'roll') {
                    rollSingleInitiative(id);
                } else if (action === 'toggle-enemy') {
                    toggleEnemy(id);
                } else if (action === 'toggle-active') {
                    toggleActive(id);
                } else if (action === 'clone') {
                    duplicateCharacter(id);
                } else if (action === 'drop') {
                    removeCharacter(id);
                } else if (action === 'stabilize') {
                    stabilizeCharacter(id);
                } else if (action === 'remove-cond') {
                    const cond = target.getAttribute('data-cond');
                    removeCondition(id, cond);
                } else if (action === 'death-save') {
                    const type = target.getAttribute('data-type');
                    const index = parseInt(target.getAttribute('data-index'), 10);
                    handleDeathSaveToggle(id, type, index);
                }
            });

            // Monitor select changes dynamically
            listContainer.addEventListener('change', (e) => {
                const target = e.target;
                if (target.matches('select[data-action="add-cond"]')) {
                    const id = target.getAttribute('data-id');
                    const cond = target.value;
                    addCondition(id, cond);
                }
            });

            // Track standard inputs in memory natively to prevent cursor jump on keystrokes
            listContainer.addEventListener('input', (e) => {
                const input = e.target;
                const field = input.getAttribute('data-field');
                if (!field) return;

                const id = input.getAttribute('data-id');
                const char = characters.find(c => c.id === id);
                if (!char) return;

                const prevVal = parseInt(char[field], 10);
                char[field] = input.value; // Store live key entry silently in background

                const nextVal = parseInt(input.value, 10);

                // Handle conditional renders if HP threshold shifts past/under zero (Triggers Death saves or Dead banner)
                const stateChanged = (isNaN(prevVal) !== isNaN(nextVal)) ||
                                     ((prevVal <= 0) !== (nextVal <= 0));

                if (stateChanged && field === 'currentHp') {
                    if (nextVal > 0) {
                        char.deathSaves = { successes: 0, failures: 0 };
                    }
                    renderCharacters();
                    // Refocus updated input element after visual refresh
                    const refreshedInput = document.querySelector(`input[data-field="currentHp"][data-id="${id}"]`);
                    if (refreshedInput) {
                        refreshedInput.focus();
                        refreshedInput.setSelectionRange(refreshedInput.value.length, refreshedInput.value.length);
                    }
                }
            });

            // Call a full render cleanup on focus loss to snap empty properties to default numbers
            listContainer.addEventListener('blur', (e) => {
                const input = e.target;
                const field = input.getAttribute('data-field');
                if (!field) return;

                const id = input.getAttribute('data-id');
                const char = characters.find(c => c.id === id);
                if (!char) return;

                if (input.value.trim() === '') {
                    char[field] = '0';
                }
                renderCharacters();
            }, true);

            // Global actions binders
            document.getElementById('btn-roll-all').addEventListener('click', rollAllInitiatives);
            document.getElementById('btn-sort').addEventListener('click', sortInitiative);
            document.getElementById('btn-save').addEventListener('click', saveToFile);
            document.getElementById('file-loader').addEventListener('change', loadFromFile);
        });
    </script>
</body>
</html>
